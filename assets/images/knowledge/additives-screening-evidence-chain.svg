<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="690" viewBox="0 0 1200 690" role="img" aria-labelledby="title desc">
  <title id="title">Evidence chain for electrolyte additive screening</title>
  <desc id="desc">Six-stage additive-screening workflow connecting baseline formulation, single additives, paired additives, full packages, stress testing, and post-mortem diagnosis.</desc>
  <rect width="1200" height="690" fill="#f4f7fb"/>
  <rect width="1200" height="92" fill="#14213d"/>
  <text x="48" y="56" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Electrolyte Additive Screening: Build an Evidence Chain</text>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(48 126)">
      <rect width="170" height="146" rx="16" fill="#ffffff" stroke="#9abff4" stroke-width="3"/>
      <circle cx="34" cy="34" r="18" fill="#2a66d9"/><text x="34" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">1</text>
      <text x="24" y="73" font-size="20" font-weight="700" fill="#14213d">Baseline</text>
      <text x="24" y="101" font-size="15" fill="#52627c">Identify untreated</text>
      <text x="24" y="122" font-size="15" fill="#52627c">failure mode.</text>
    </g>
    <g transform="translate(235 126)">
      <rect width="170" height="146" rx="16" fill="#ffffff" stroke="#9abff4" stroke-width="3"/>
      <circle cx="34" cy="34" r="18" fill="#2a66d9"/><text x="34" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">2</text>
      <text x="24" y="73" font-size="20" font-weight="700" fill="#14213d">Single additive</text>
      <text x="24" y="101" font-size="15" fill="#52627c">Resolve individual</text>
      <text x="24" y="122" font-size="15" fill="#52627c">effects and dosage.</text>
    </g>
    <g transform="translate(422 126)">
      <rect width="170" height="146" rx="16" fill="#ffffff" stroke="#79c8bd" stroke-width="3"/>
      <circle cx="34" cy="34" r="18" fill="#168c84"/><text x="34" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">3</text>
      <text x="24" y="73" font-size="19" font-weight="700" fill="#14213d">Paired additives</text>
      <text x="24" y="101" font-size="15" fill="#52627c">Test SEI / CEI</text>
      <text x="24" y="122" font-size="15" fill="#52627c">interaction effects.</text>
    </g>
    <g transform="translate(609 126)">
      <rect width="170" height="146" rx="16" fill="#ffffff" stroke="#79c8bd" stroke-width="3"/>
      <circle cx="34" cy="34" r="18" fill="#168c84"/><text x="34" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">4</text>
      <text x="24" y="73" font-size="20" font-weight="700" fill="#14213d">Full package</text>
      <text x="24" y="101" font-size="15" fill="#52627c">Check balanced</text>
      <text x="24" y="122" font-size="15" fill="#52627c">full-cell response.</text>
    </g>
    <g transform="translate(796 126)">
      <rect width="170" height="146" rx="16" fill="#ffffff" stroke="#e4c46e" stroke-width="3"/>
      <circle cx="34" cy="34" r="18" fill="#b8964a"/><text x="34" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">5</text>
      <text x="24" y="73" font-size="20" font-weight="700" fill="#14213d">Stress tests</text>
      <text x="24" y="101" font-size="15" fill="#52627c">Voltage, cold, heat,</text>
      <text x="24" y="122" font-size="15" fill="#52627c">fast charge, storage.</text>
    </g>
    <g transform="translate(983 126)">
      <rect width="170" height="146" rx="16" fill="#ffffff" stroke="#e29a9a" stroke-width="3"/>
      <circle cx="34" cy="34" r="18" fill="#c93d3d"/><text x="34" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">6</text>
      <text x="24" y="73" font-size="20" font-weight="700" fill="#14213d">Diagnosis</text>
      <text x="24" y="101" font-size="15" fill="#52627c">Determine what was</text>
      <text x="24" y="122" font-size="15" fill="#52627c">delayed or shifted.</text>
    </g>

    <path d="M218 199 H232 M405 199 H419 M592 199 H606 M779 199 H793 M966 199 H980" stroke="#7f90a9" stroke-width="4"/>

    <text x="48" y="325" font-size="24" font-weight="700" fill="#14213d">Minimum evidence at each stage</text>
    <rect x="48" y="354" width="1104" height="244" rx="18" fill="#ffffff" stroke="#d2dbe8" stroke-width="2"/>

    <circle cx="88" cy="402" r="7" fill="#2a66d9"/>
    <text x="110" y="409" font-size="18" font-weight="700" fill="#14213d">Electrochemical:</text>
    <text x="270" y="409" font-size="18" fill="#52627c">first-cycle efficiency, long-term CE, retention, EIS, rate and leakage current</text>

    <circle cx="88" cy="449" r="7" fill="#168c84"/>
    <text x="110" y="456" font-size="18" font-weight="700" fill="#14213d">Physical:</text>
    <text x="206" y="456" font-size="18" fill="#52627c">gas volume, swelling, thickness change, wetting and temperature response</text>

    <circle cx="88" cy="496" r="7" fill="#b8964a"/>
    <text x="110" y="503" font-size="18" font-weight="700" fill="#14213d">Chemical:</text>
    <text x="220" y="503" font-size="18" fill="#52627c">XPS, NMR, GC-MS, HF / water, transition-metal ICP and anode deposition</text>

    <circle cx="88" cy="543" r="7" fill="#c93d3d"/>
    <text x="110" y="550" font-size="18" font-weight="700" fill="#14213d">Failure-specific:</text>
    <text x="260" y="550" font-size="18" fill="#52627c">plating diagnostics, rollover timing, high-voltage storage and post-cold recovery</text>

    <rect x="238" y="624" width="724" height="42" rx="21" fill="#eaf2ff" stroke="#aac7f2"/>
    <text x="600" y="651" text-anchor="middle" font-size="18" font-weight="700" fill="#14213d">Do not add complexity faster than the experiment can explain it.</text>
  </g>
</svg>
