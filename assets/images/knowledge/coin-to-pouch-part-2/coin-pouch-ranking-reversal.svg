<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 950" role="img" aria-label="Illustrative comparison of coin and pouch cell rankings across retention rate capability and impedance growth">
<defs><style>
.title{font:800 28px Inter,Arial,sans-serif;fill:#fff}.sub{font:600 14px Inter,Arial,sans-serif;fill:#d8e2ef}.h{font:800 21px Inter,Arial,sans-serif;fill:#122033}.metric{font:800 17px Inter,Arial,sans-serif;fill:#122033}.axislabel{font:700 13px Inter,Arial,sans-serif;fill:#53627c}.small{font:800 14px Inter,Arial,sans-serif}.panel{fill:#fff;fill-opacity:.74;stroke:#cfd9e7;stroke-width:1.5}.axis{stroke:#14213d;stroke-width:2;fill:none}.grid{stroke:#dce4ef;stroke-width:1}.a{stroke:#2f6edb;stroke-width:5;fill:none}.b{stroke:#bd9540;stroke-width:5;fill:none}
</style></defs>
<rect width="1120" height="950" rx="28" fill="#f3f6fb"/>
<rect width="1120" height="96" rx="28" fill="#14213d"/>
<text x="42" y="48" class="title">Why Coin-Cell Winners Can Reverse in Pouch Cells</text>
<text x="42" y="73" class="sub">Illustrative rankings across retention, rate capability, and impedance growth under format-specific constraints</text>
<text x="286" y="132" text-anchor="middle" class="h">Coin-cell screening</text>
