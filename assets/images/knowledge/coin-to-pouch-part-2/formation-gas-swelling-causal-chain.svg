<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" role="img" aria-label="Formation protocol, interphase response, gas generation, pouch swelling, and impedance">
<defs><style>
.title{font:800 28px Inter,Arial,sans-serif;fill:#fff}.sub{font:600 14px Inter,Arial,sans-serif;fill:#d8e2ef}.h{font:800 20px Inter,Arial,sans-serif;fill:#122033}.p{font:600 14px Inter,Arial,sans-serif;fill:#40516f}.small{font:700 13px Inter,Arial,sans-serif;fill:#53627c}.label{font:800 15px Inter,Arial,sans-serif;fill:#122033}.panel{fill:#fff;stroke:#d6dfec;stroke-width:1.5}.navy{fill:#14213d}.axis{stroke:#14213d;stroke-width:2;fill:none}.arrow{stroke:#14213d;stroke-width:3;fill:none;marker-end:url(#a)}
</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L8 3L0 6Z" fill="#14213d"/></marker></defs>
<rect width="1120" height="760" rx="28" fill="#f3f6fb"/>
<rect width="1120" height="96" rx="28" class="navy"/>
<text x="42" y="48" class="title">Formation Couples Additive Consumption, Gas, and Impedance</text>
<text x="42" y="74" class="sub">The first cycles define the interphase while revealing gas-management and contact risks</text>

<g transform="translate(28 124)">
  <rect width="294" height="370" rx="20" fill="#eaf2ff" stroke="#9cc0ff"/>
  <text x="22" y="40" class="h">1. Formation protocol</text>
  <line x1="56" y1="245" x2="264" y2="245" class="axis"/><line x1="56" y1="245" x2="56" y2="78" class="axis"/>
  <path d="M64 218L92 188L124 150L156 104L202 91L258 91" stroke="#168b84" stroke-width="4" fill="none"/>
  <path d="M64 155L198 155L222 162L242 184L258 216" stroke="#2f6edb" stroke-width="4" fill="none"/>
  <text x="208" y="81" class="small" fill="#168b84">voltage hold</text>
  <text x="110" y="145" class="small" fill="#2f6edb">constant current</text>
  <text x="211" y="178" class="small" fill="#2f6edb">CV decay</text>
  <text x="160" y="268" text-anchor="middle" class="small">time / capacity</text>
  <text x="31" y="166" text-anchor="middle" transform="rotate(-90 31 166)" class="small">voltage / current</text>
  <text x="147" y="312" text-anchor="middle" class="p">Current and voltage holds, temperature,</text>
  <text x="147" y="334" text-anchor="middle" class="p">rest steps, pressure, and degassing.</text>
</g>
<path d="M329 304H352" class="arrow"/>

<g transform="translate(360 124)">
  <rect width="316" height="370" rx="20" fill="#e4f5f2" stroke="#9ad8d0"/>
  <text x="22" y="40" class="h">2. Interphase response</text>
  <g transform="translate(55 77)">
    <g transform="translate(44 40)"><circle r="28" fill="#7d91af"/><circle r="36" fill="none" stroke="#2f6edb" stroke-width="7" stroke-dasharray="8 5"/></g>
    <g transform="translate(112 29)"><circle r="28" fill="#7d91af"/><circle r="36" fill="none" stroke="#2f6edb" stroke-width="7" stroke-dasharray="8 5"/></g>
    <g transform="translate(180 43)"><circle r="28" fill="#7d91af"/><circle r="36" fill="none" stroke="#2f6edb" stroke-width="7" stroke-dasharray="8 5"/></g>
    <g transform="translate(78 102)"><circle r="28" fill="#7d91af"/><circle r="36" fill="none" stroke="#2f6edb" stroke-width="7" stroke-dasharray="8 5"/></g>
    <g transform="translate(150 103)"><circle r="28" fill="#7d91af"/><circle r="36" fill="none" stroke="#2f6edb" stroke-width="7" stroke-dasharray="8 5"/></g>
  </g>
  <text x="158" y="243" text-anchor="middle" class="small">protected particle interfaces</text>
  <text x="158" y="270" text-anchor="middle" class="small">additive reservoir after formation</text>
  <rect x="52" y="280" width="212" height="18" rx="9" fill="#fff" stroke="#c8ddd9"/>
  <rect x="52" y="280" width="112" height="18" rx="9" fill="#77c8bd"/>
  <text x="158" y="326" text-anchor="middle" class="p">SEI / CEI chemistry, additive use,</text>
  <text x="158" y="348" text-anchor="middle" class="p">Li inventory loss, and cross-talk.</text>
</g>
<path d="M682 304H705" class="arrow"/>

<g transform="translate(713 124)">
  <rect width="379" height="370" rx="20" fill="#fff4d9" stroke="#e0bd62"/>
  <text x="22" y="40" class="h">3. Gas, swelling, and impedance</text>
  <g transform="translate(20 67)">
    <path d="M10 150Q10 32 76 32H100Q166 32 166 150V178H10Z" fill="#fff" stroke="#bd9540" stroke-width="3"/>
    <path d="M20 144Q20 55 77 55H99Q156 55 156 144" fill="#f6d99b" opacity=".78"/>
    <circle cx="50" cy="104" r="11" fill="#cf3b3b"/><circle cx="88" cy="77" r="9" fill="#cf3b3b"/><circle cx="128" cy="118" r="13" fill="#cf3b3b"/>
    <text x="88" y="202" text-anchor="middle" class="small">gas pockets and swelling</text>
  </g>
  <g transform="translate(205 67)">
    <line x1="22" y1="178" x2="150" y2="178" class="axis"/><line x1="22" y1="178" x2="22" y2="32" class="axis"/>
    <path d="M32 164C63 150 79 128 94 93S125 50 142 39" stroke="#cf3b3b" stroke-width="4" fill="none"/>
    <text x="87" y="202" text-anchor="middle" class="small">cycle / hold time</text>
    <text x="7" y="109" text-anchor="middle" transform="rotate(-90 7 109)" class="small">EIS / DCIR</text>
  </g>
  <text x="190" y="326" text-anchor="middle" class="p">Gas identity, soft spots, delamination,</text>
  <text x="190" y="348" text-anchor="middle" class="p">degassing window, and impedance growth.</text>
</g>

<g transform="translate(42 532)">
  <rect width="1036" height="156" rx="20" class="panel"/>
  <text x="24" y="40" class="h">Formation translation evidence</text>
  <g transform="translate(24 64)"><rect width="232" height="64" rx="12" fill="#eaf2ff"/><text x="18" y="27" class="label">Electrochemical</text><text x="18" y="49" class="small">FCE, dQ/dV, EIS/DCIR</text></g>
  <g transform="translate(276 64)"><rect width="232" height="64" rx="12" fill="#e4f5f2"/><text x="18" y="27" class="label">Chemical</text><text x="18" y="49" class="small">additive depletion, gas identity</text></g>
  <g transform="translate(528 64)"><rect width="232" height="64" rx="12" fill="#fff4d9"/><text x="18" y="27" class="label">Physical</text><text x="18" y="49" class="small">thickness, volume, pressure</text></g>
  <g transform="translate(780 64)"><rect width="232" height="64" rx="12" fill="#fff0f0"/><text x="18" y="27" class="label">Statistical</text><text x="18" y="49" class="small">replicates and cell scatter</text></g>
</g>
</svg>
