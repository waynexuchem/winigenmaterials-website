<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" role="img" aria-label="Lean electrolyte filling and trapped gas in high loading electrodes">
<defs><style>
.title{font:800 27px Inter,Arial,sans-serif;fill:#fff}.sub{font:600 13px Inter,Arial,sans-serif;fill:#d8e2ef}.h{font:800 19px Inter,Arial,sans-serif;fill:#122033}.p{font:600 13px Inter,Arial,sans-serif;fill:#40516f}.small{font:700 12px Inter,Arial,sans-serif;fill:#53627c}.label{font:800 15px Inter,Arial,sans-serif;fill:#122033}.panel{fill:#fff;stroke:#d6dfec;stroke-width:1.5}.navy{fill:#14213d}
</style></defs>
<rect width="1120" height="720" rx="28" fill="#f3f6fb"/>
<rect width="1120" height="96" rx="28" class="navy"/>
<text x="42" y="48" class="title">E/C Ratio, High Loading, and Trapped Gas</text>
<text x="42" y="73" class="sub">A lower electrolyte-to-capacity ratio makes wetting quality and pore-scale saturation more important</text>

<g transform="translate(58 126)">
  <rect width="480" height="414" rx="20" class="panel"/>
  <text x="28" y="42" class="h">High-loading porous electrode</text>
  <rect x="52" y="86" width="372" height="238" rx="18" fill="#eef3f9" stroke="#b9c6d8"/>
  <g fill="#64748b">
    <circle cx="82" cy="114" r="16"/><circle cx="128" cy="114" r="16"/><circle cx="174" cy="114" r="16"/><circle cx="220" cy="114" r="16"/><circle cx="266" cy="114" r="16"/><circle cx="312" cy="114" r="16"/><circle cx="358" cy="114" r="16"/><circle cx="404" cy="114" r="16"/>
    <circle cx="82" cy="160" r="16"/><circle cx="128" cy="160" r="16"/><circle cx="174" cy="160" r="16"/><circle cx="220" cy="160" r="16"/><circle cx="266" cy="160" r="16"/><circle cx="312" cy="160" r="16"/><circle cx="358" cy="160" r="16"/><circle cx="404" cy="160" r="16"/>
    <circle cx="82" cy="206" r="16"/><circle cx="128" cy="206" r="16"/><circle cx="174" cy="206" r="16"/><circle cx="220" cy="206" r="16"/><circle cx="266" cy="206" r="16"/><circle cx="312" cy="206" r="16"/><circle cx="358" cy="206" r="16"/><circle cx="404" cy="206" r="16"/>
    <circle cx="82" cy="252" r="16"/><circle cx="128" cy="252" r="16"/><circle cx="174" cy="252" r="16"/><circle cx="220" cy="252" r="16"/><circle cx="266" cy="252" r="16"/><circle cx="312" cy="252" r="16"/><circle cx="358" cy="252" r="16"/><circle cx="404" cy="252" r="16"/>
    <circle cx="82" cy="298" r="16"/><circle cx="128" cy="298" r="16"/><circle cx="174" cy="298" r="16"/><circle cx="220" cy="298" r="16"/><circle cx="266" cy="298" r="16"/><circle cx="312" cy="298" r="16"/><circle cx="358" cy="298" r="16"/><circle cx="404" cy="298" r="16"/>
  </g>
  <path d="M61 151C110 115 151 191 202 151S296 113 351 158S397 184 416 159" stroke="#2f6edb" stroke-width="4" fill="none" stroke-dasharray="8 7"/>
  <path d="M61 217C116 180 150 254 214 214S309 178 365 226S400 245 416 226" stroke="#2f6edb" stroke-width="4" fill="none" stroke-dasharray="8 7"/>
  <path d="M61 280C107 247 158 318 215 278S308 243 364 289S402 306 416 288" stroke="#2f6edb" stroke-width="4" fill="none" stroke-dasharray="8 7"/>
  <circle cx="248" cy="171" r="9" fill="#cf3b3b"/><circle cx="337" cy="270" r="9" fill="#cf3b3b"/><circle cx="151" cy="229" r="9" fill="#cf3b3b"/><circle cx="384" cy="136" r="9" fill="#cf3b3b"/>
  <rect x="28" y="348" width="424" height="44" rx="11" fill="#eef4fb"/>
  <text x="240" y="367" text-anchor="middle" class="p">Electrolyte must reach tortuous internal pores,</text>
  <text x="240" y="385" text-anchor="middle" class="p">not only the separator-facing edge.</text>
</g>

<g transform="translate(574 126)">
  <rect width="488" height="414" rx="20" class="panel"/>
  <text x="28" y="42" class="h">What lean filling exposes</text>
  <g transform="translate(30 78)"><rect width="428" height="68" rx="13" fill="#eaf2ff" stroke="#9cc0ff"/><text x="20" y="30" class="label">Low E/C ratio</text><text x="176" y="27" class="p">less liquid buffer</text><text x="176" y="46" class="p">for dry regions</text></g>
  <g transform="translate(30 160)"><rect width="428" height="68" rx="13" fill="#e4f5f2" stroke="#9ad8d0"/><text x="20" y="39" class="label">Rest time</text><text x="176" y="27" class="p">sets wetting-front</text><text x="176" y="46" class="p">progress and saturation</text></g>
  <g transform="translate(30 242)"><rect width="428" height="68" rx="13" fill="#fff4d9" stroke="#e0bd62"/><text x="20" y="39" class="label">Vacuum fill</text><text x="176" y="27" class="p">removes trapped gas</text><text x="176" y="46" class="p">and dead volume</text></g>
  <g transform="translate(30 324)"><rect width="428" height="68" rx="13" fill="#fff0f0" stroke="#f0a2a2"/><text x="20" y="39" class="label">Drying history</text><text x="176" y="27" class="p">changes residual water</text><text x="176" y="46" class="p">and pore accessibility</text></g>
</g>

<rect x="148" y="584" width="824" height="76" rx="16" fill="#eaf2ff" stroke="#9cc0ff"/>
<text x="560" y="616" text-anchor="middle" class="label">A pouch-cell wetting test connects electrochemistry with materials,</text>
<text x="560" y="640" text-anchor="middle" class="label">pore-network transport, filling conditions, and process control.</text>
</svg>
