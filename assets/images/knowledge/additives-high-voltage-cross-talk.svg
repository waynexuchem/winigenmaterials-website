<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">High-voltage cathode degradation and electrode cross-talk</title>
  <desc id="desc">Conceptual flow from cathode oxidation and transition-metal dissolution through electrolyte transport to anode SEI contamination, impedance growth, and rollover failure.</desc>
  <rect width="1200" height="720" fill="#f4f7fb"/>
  <rect width="1200" height="92" fill="#14213d"/>
  <text x="48" y="56" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">High-Voltage Additive Screening Must Track Both Electrodes</text>

  <rect x="48" y="130" width="300" height="470" rx="18" fill="#ffffff" stroke="#ef9a9a" stroke-width="3"/>
  <text x="78" y="177" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#c93d3d">High-voltage cathode</text>
  <g transform="translate(92 218)">
    <rect width="220" height="44" rx="8" fill="#6d4bb3"/>
    <rect y="54" width="220" height="44" rx="8" fill="#7c5bc1"/>
    <rect y="108" width="220" height="44" rx="8" fill="#8c6dcc"/>
  </g>
  <text x="78" y="421" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#14213d">Coupled reactions</text>
  <circle cx="86" cy="454" r="5" fill="#c93d3d"/><text x="102" y="460" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">electrolyte oxidation and gas</text>
  <circle cx="86" cy="487" r="5" fill="#c93d3d"/><text x="102" y="493" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">surface reconstruction</text>
  <circle cx="86" cy="520" r="5" fill="#c93d3d"/><text x="102" y="526" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">Ni / Mn / Co dissolution</text>
  <circle cx="86" cy="553" r="5" fill="#c93d3d"/><text x="102" y="559" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">acidic or soluble products</text>

  <path d="M348 310 H450" stroke="#7f90a9" stroke-width="5"/>
  <path d="M430 295 L450 310 L430 325" fill="none" stroke="#7f90a9" stroke-width="5"/>
  <path d="M750 310 H852" stroke="#7f90a9" stroke-width="5"/>
  <path d="M832 295 L852 310 L832 325" fill="none" stroke="#7f90a9" stroke-width="5"/>

  <rect x="450" y="130" width="300" height="470" rx="18" fill="#ffffff" stroke="#86bde8" stroke-width="3"/>
  <text x="480" y="177" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#2a66d9">Electrolyte transport</text>
  <path d="M508 270 C548 216 593 326 638 270 C683 214 708 302 716 270" fill="none" stroke="#2a66d9" stroke-width="8" stroke-linecap="round"/>
  <circle cx="535" cy="248" r="18" fill="#c93d3d"/><text x="535" y="254" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">TM</text>
  <circle cx="610" cy="283" r="18" fill="#c93d3d"/><text x="610" y="289" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">TM</text>
  <circle cx="681" cy="247" r="18" fill="#c93d3d"/><text x="681" y="253" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">TM</text>
  <text x="480" y="421" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#14213d">What moves between electrodes</text>
  <circle cx="488" cy="454" r="5" fill="#2a66d9"/><text x="504" y="460" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">dissolved transition metals</text>
  <circle cx="488" cy="487" r="5" fill="#2a66d9"/><text x="504" y="493" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">oxidation and salt products</text>
  <circle cx="488" cy="520" r="5" fill="#2a66d9"/><text x="504" y="526" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">HF / water-related species</text>
  <circle cx="488" cy="553" r="5" fill="#2a66d9"/><text x="504" y="559" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">additive reaction products</text>

  <rect x="852" y="130" width="300" height="470" rx="18" fill="#ffffff" stroke="#d8b45f" stroke-width="3"/>
  <text x="882" y="177" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#9a7418">Anode</text>
  <circle cx="1002" cy="283" r="76" fill="#667992"/>
  <circle cx="1002" cy="283" r="95" fill="none" stroke="#b8964a" stroke-width="14" stroke-dasharray="16 9"/>
  <circle cx="952" cy="231" r="14" fill="#c93d3d"/>
  <circle cx="1052" cy="258" r="14" fill="#c93d3d"/>
  <circle cx="966" cy="334" r="14" fill="#c93d3d"/>
  <text x="882" y="421" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#14213d">Full-cell consequences</text>
  <circle cx="890" cy="454" r="5" fill="#b8964a"/><text x="906" y="460" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">SEI contamination</text>
  <circle cx="890" cy="487" r="5" fill="#b8964a"/><text x="906" y="493" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">impedance growth</text>
  <circle cx="890" cy="520" r="5" fill="#b8964a"/><text x="906" y="526" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">lithium plating risk</text>
  <circle cx="890" cy="553" r="5" fill="#b8964a"/><text x="906" y="559" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">rollover failure</text>

  <rect x="150" y="632" width="900" height="52" rx="26" fill="#eaf2ff" stroke="#aac7f2"/>
  <text x="600" y="665" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#14213d">Measure cathode protection, soluble species, anode deposition, gas, and impedance together.</text>
</svg>
