<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">Wide-temperature electrolytes must solve different failure modes</title>
  <desc id="desc">Cold, nominal, and hot operating risks connected to wide-temperature and long-life formulation strategies.</desc>
  <rect width="1600" height="1080" fill="#f3f6fb"/>
  <rect width="1600" height="116" fill="#142542"/>
  <text x="64" y="73" fill="#fff" font-family="Arial,sans-serif" font-size="39" font-weight="700">Wide-Temperature Electrolytes Must Solve Different Failure Modes</text>

  <line x1="155" y1="210" x2="1445" y2="210" stroke="#142542" stroke-width="6"/>
  <circle cx="220" cy="210" r="18" fill="#2f6dde"/><circle cx="800" cy="210" r="18" fill="#168f8b"/><circle cx="1380" cy="210" r="18" fill="#c84b49"/>
  <g text-anchor="middle" font-family="Arial,sans-serif">
    <text x="220" y="170" fill="#2864d7" font-size="29" font-weight="700">Cold operation</text>
    <text x="220" y="255" fill="#40516f" font-size="21">−40 to −20 °C</text>
    <text x="800" y="170" fill="#11857f" font-size="29" font-weight="700">Nominal operation</text>
    <text x="800" y="255" fill="#40516f" font-size="21">20 to 30 °C</text>
    <text x="1380" y="170" fill="#bd403f" font-size="29" font-weight="700">Hot operation</text>
    <text x="1380" y="255" fill="#40516f" font-size="21">45 to 80 °C</text>
  </g>

  <g>
    <rect x="65" y="300" width="455" height="300" rx="22" fill="#fff" stroke="#a8c5ff" stroke-width="3"/>
    <text x="100" y="350" fill="#2864d7" font-family="Arial,sans-serif" font-size="28" font-weight="700">Cold-side risks</text>
    <text x="100" y="402" fill="#263954" font-family="Arial,sans-serif" font-size="20">
      <tspan x="100">• Solvent freezing or steep viscosity increase</tspan>
      <tspan x="100" dy="40">• Lower conductivity and slower desolvation</tspan>
      <tspan x="100" dy="40">• Larger polarization and weaker rate capability</tspan>
      <tspan x="100" dy="40">• Interphase resistance becomes more visible</tspan>
    </text>
  </g>
  <g>
    <rect x="573" y="300" width="455" height="300" rx="22" fill="#fff" stroke="#9fd7d1" stroke-width="3"/>
    <text x="608" y="350" fill="#11857f" font-family="Arial,sans-serif" font-size="28" font-weight="700">Balanced baseline</text>
    <text x="608" y="402" fill="#263954" font-family="Arial,sans-serif" font-size="20">
      <tspan x="608">• Salt solubility and useful conductivity</tspan>
      <tspan x="608" dy="40">• Hard-carbon SEI and cathode CEI stability</tspan>
      <tspan x="608" dy="40">• Wetting, first-cycle efficiency, and retention</tspan>
      <tspan x="608" dy="40">• Cost, purity, and practical formation protocol</tspan>
    </text>
  </g>
  <g>
    <rect x="1080" y="300" width="455" height="300" rx="22" fill="#fff" stroke="#efb0ad" stroke-width="3"/>
    <text x="1115" y="350" fill="#bd403f" font-family="Arial,sans-serif" font-size="28" font-weight="700">Hot-side risks</text>
    <text x="1115" y="402" fill="#263954" font-family="Arial,sans-serif" font-size="20">
      <tspan x="1115">• Volatility, salt degradation, and HF chemistry</tspan>
      <tspan x="1115" dy="40">• Faster SEI/CEI dissolution or reconstruction</tspan>
      <tspan x="1115" dy="40">• Gas generation and pouch-cell swelling</tspan>
      <tspan x="1115" dy="40">• Accelerated impedance and capacity loss</tspan>
    </text>
  </g>

  <text x="66" y="658" fill="#142542" font-family="Arial,sans-serif" font-size="31" font-weight="700">Formulation toolbox</text>

  <g>
    <rect x="65" y="695" width="710" height="315" rx="24" fill="#fff" stroke="#a8c5ff" stroke-width="3"/>
    <text x="100" y="748" fill="#2864d7" font-family="Arial,sans-serif" font-size="28" font-weight="700">Wide-temperature strategy</text>
    <rect x="100" y="785" width="270" height="72" rx="15" fill="#e8efff"/>
    <text x="235" y="817" text-anchor="middle" fill="#2864d7" font-family="Arial,sans-serif" font-size="21" font-weight="700">PC + EMC</text>
    <text x="235" y="843" text-anchor="middle" fill="#40516f" font-family="Arial,sans-serif" font-size="17">broader liquid range</text>
    <path d="M390 821 H450" stroke="#6c7d95" stroke-width="4"/><path d="M438 809 l16 12 -16 12" fill="none" stroke="#6c7d95" stroke-width="4"/>
    <rect x="470" y="785" width="270" height="72" rx="15" fill="#e2f3ef"/>
    <text x="605" y="817" text-anchor="middle" fill="#11857f" font-family="Arial,sans-serif" font-size="21" font-weight="700">NaODFB + FEC</text>
    <text x="605" y="843" text-anchor="middle" fill="#40516f" font-family="Arial,sans-serif" font-size="17">stable SEI / CEI</text>
    <text x="100" y="908" fill="#263954" font-family="Arial,sans-serif" font-size="20">
      <tspan x="100">Pair low-temperature transport with interphases that remain</tspan>
      <tspan x="100" dy="34">stable during room-temperature recovery and hot cycling.</tspan>
    </text>
  </g>

  <g>
    <rect x="825" y="695" width="710" height="315" rx="24" fill="#fff" stroke="#e7c56f" stroke-width="3"/>
    <text x="860" y="748" fill="#9b7417" font-family="Arial,sans-serif" font-size="28" font-weight="700">Long-life and gas-control strategy</text>
    <rect x="860" y="785" width="270" height="72" rx="15" fill="#fbf1d7"/>
    <text x="995" y="817" text-anchor="middle" fill="#9b7417" font-family="Arial,sans-serif" font-size="21" font-weight="700">Trace H₂O / HF</text>
    <text x="995" y="843" text-anchor="middle" fill="#40516f" font-family="Arial,sans-serif" font-size="17">reactive species</text>
    <path d="M1150 821 H1210" stroke="#6c7d95" stroke-width="4"/><path d="M1198 809 l16 12 -16 12" fill="none" stroke="#6c7d95" stroke-width="4"/>
    <rect x="1230" y="785" width="270" height="72" rx="15" fill="#f9e5e7"/>
    <text x="1365" y="817" text-anchor="middle" fill="#bd403f" font-family="Arial,sans-serif" font-size="21" font-weight="700">SA / GA / TMSPi</text>
    <text x="1365" y="843" text-anchor="middle" fill="#40516f" font-family="Arial,sans-serif" font-size="17">scavenger additives</text>
    <text x="860" y="908" fill="#263954" font-family="Arial,sans-serif" font-size="20">
      <tspan x="860">Use targeted scavenging and oxidation/reduction control to</tspan>
      <tspan x="860" dy="34">limit gas, impedance growth, and interphase degradation.</tspan>
    </text>
  </g>
</svg>
