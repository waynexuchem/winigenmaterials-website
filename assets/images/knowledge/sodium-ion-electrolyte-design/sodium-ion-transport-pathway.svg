<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">Where sodium-ion transport can become rate-limiting</title>
  <desc id="desc">A detailed transport pathway from cathode through CEI, bulk electrolyte, and SEI to hard carbon, with electrolyte design levers.</desc>
  <rect width="1600" height="1080" fill="#f3f6fb"/>
  <rect width="1600" height="116" fill="#142542"/>
  <text x="65" y="73" fill="#fff" font-family="Arial,sans-serif" font-size="40" font-weight="700">Where Sodium-Ion Transport Can Become Rate-Limiting</text>

  <g>
    <rect x="64" y="160" width="1472" height="450" rx="24" fill="#fff" stroke="#cbd7e7" stroke-width="2"/>
    <rect x="65" y="160" width="235" height="450" rx="24" fill="#dce8f7"/>
    <rect x="300" y="160" width="175" height="450" fill="#f6e5c7"/>
    <rect x="475" y="160" width="650" height="450" fill="#e4f1e7"/>
    <rect x="1125" y="160" width="175" height="450" fill="#f8dfe3"/>
    <rect x="1300" y="160" width="235" height="450" rx="24" fill="#dce8f0"/>
    <text x="182" y="205" text-anchor="middle" fill="#142542" font-family="Arial,sans-serif" font-size="28" font-weight="700">Cathode</text>
    <text x="388" y="205" text-anchor="middle" fill="#94691d" font-family="Arial,sans-serif" font-size="28" font-weight="700">CEI</text>
    <text x="800" y="205" text-anchor="middle" fill="#187545" font-family="Arial,sans-serif" font-size="28" font-weight="700">Bulk electrolyte</text>
    <text x="1212" y="205" text-anchor="middle" fill="#b83e51" font-family="Arial,sans-serif" font-size="28" font-weight="700">SEI</text>
    <text x="1418" y="205" text-anchor="middle" fill="#142542" font-family="Arial,sans-serif" font-size="28" font-weight="700">Hard carbon</text>

    <path d="M102 405 C155 345 205 455 270 390 S350 290 420 365 S520 445 590 350 S690 290 760 375 S875 440 950 340 S1060 290 1135 372 S1235 430 1305 342 S1415 305 1494 390" fill="none" stroke="#142542" stroke-width="6"/>
    <path d="M125 405 L260 405 M320 390 L450 390 M505 370 L1090 370 M1152 370 L1280 370 M1335 390 L1480 390" stroke="#6c7d95" stroke-width="2" stroke-dasharray="8 8"/>

    <g fill="#2f6dde" stroke="#fff" stroke-width="4">
      <circle cx="155" cy="370" r="21"/><circle cx="360" cy="340" r="21"/><circle cx="650" cy="329" r="21"/>
      <circle cx="930" cy="326" r="21"/><circle cx="1205" cy="337" r="21"/><circle cx="1435" cy="355" r="21"/>
    </g>
    <g fill="#fff" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="700">
      <text x="155" y="376">Na+</text><text x="360" y="346">Na+</text><text x="650" y="335">Na+</text>
      <text x="930" y="332">Na+</text><text x="1205" y="343">Na+</text><text x="1435" y="361">Na+</text>
    </g>

    <g fill="none" stroke="#77a9dd" stroke-width="3">
      <circle cx="650" cy="329" r="40"/><circle cx="930" cy="326" r="40"/>
      <path d="M620 300 l-17 -16 M680 300 l17 -16 M620 357 l-17 16 M680 357 l17 16"/>
      <path d="M900 297 l-17 -16 M960 297 l17 -16 M900 354 l-17 16 M960 354 l17 16"/>
    </g>

    <g fill="#40516f" text-anchor="middle" font-family="Arial,sans-serif" font-size="20">
      <text x="180" y="510"><tspan x="180">solid-state</tspan><tspan x="180" dy="28">diffusion</tspan></text>
      <text x="388" y="510"><tspan x="388">crossing the</tspan><tspan x="388" dy="28">cathode CEI</tspan></text>
      <text x="585" y="510"><tspan x="585">solvation and</tspan><tspan x="585" dy="28">ion pairing</tspan></text>
      <text x="800" y="510"><tspan x="800">solvated-ion diffusion</tspan><tspan x="800" dy="28">through the liquid phase</tspan></text>
      <text x="1212" y="510"><tspan x="1212">desolvation and</tspan><tspan x="1212" dy="28">SEI transfer</tspan></text>
      <text x="1418" y="510"><tspan x="1418">storage and diffusion</tspan><tspan x="1418" dy="28">in hard carbon</tspan></text>
    </g>
  </g>

  <text x="66" y="665" fill="#142542" font-family="Arial,sans-serif" font-size="31" font-weight="700">Electrolyte design levers</text>

  <g>
    <rect x="64" y="705" width="455" height="300" rx="22" fill="#fff" stroke="#a8c5ff" stroke-width="3"/>
    <text x="96" y="757" fill="#2864d7" font-family="Arial,sans-serif" font-size="28" font-weight="700">Solvent system</text>
    <text x="96" y="808" fill="#263954" font-family="Arial,sans-serif" font-size="20">
      <tspan x="96">Low viscosity and suitable dielectric response</tspan>
      <tspan x="96" dy="34">support bulk transport and cold operation.</tspan>
      <tspan x="96" dy="48" font-weight="700">Examples</tspan>
      <tspan x="96" dy="30">PC, EMC, fluorinated or ether co-solvents</tspan>
    </text>
  </g>
  <g>
    <rect x="573" y="705" width="455" height="300" rx="22" fill="#fff" stroke="#9fd7d1" stroke-width="3"/>
    <text x="605" y="757" fill="#11857f" font-family="Arial,sans-serif" font-size="28" font-weight="700">Sodium salt</text>
    <text x="605" y="808" fill="#263954" font-family="Arial,sans-serif" font-size="20">
      <tspan x="605">Dissociation, solubility, and anion chemistry</tspan>
      <tspan x="605" dy="34">influence conductivity and interphase</tspan>
      <tspan x="605" dy="30">sensitivity.</tspan>
      <tspan x="605" dy="42" font-weight="700">Examples</tspan>
      <tspan x="605" dy="30">NaPF₆, NaODFB, NaTFSI</tspan>
    </text>
  </g>
  <g>
    <rect x="1082" y="705" width="455" height="300" rx="22" fill="#fff" stroke="#e7c56f" stroke-width="3"/>
    <text x="1114" y="757" fill="#9b7417" font-family="Arial,sans-serif" font-size="28" font-weight="700">Additive package</text>
    <text x="1114" y="808" fill="#263954" font-family="Arial,sans-serif" font-size="20">
      <tspan x="1114">Preferential reactions can lower interfacial</tspan>
      <tspan x="1114" dy="34">impedance and suppress parasitic chemistry.</tspan>
      <tspan x="1114" dy="48" font-weight="700">Examples</tspan>
      <tspan x="1114" dy="30">FEC, DTD, phosphate additives</tspan>
    </text>
  </g>
</svg>
