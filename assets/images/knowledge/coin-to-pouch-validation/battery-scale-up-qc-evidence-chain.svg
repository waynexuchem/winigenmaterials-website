<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="740" viewBox="0 0 1200 740" role="img" aria-labelledby="title desc">
  <title id="title">Battery scale-up quality-control evidence chain</title>
  <desc id="desc">Five connected quality-control domains from incoming materials to post-mortem diagnosis for pouch-cell scale-up.</desc>
  <rect width="1200" height="740" fill="#f4f7fb"/>
  <rect width="1200" height="92" fill="#14213d"/>
  <text x="48" y="58" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="800">Build a Scale-Up Evidence Chain, Not a Single Cycling Plot</text>
  <g font-family="Inter,Arial,sans-serif">
    <g transform="translate(30 138)">
      <rect width="216" height="372" rx="18" fill="#fff" stroke="#8bb4ed" stroke-width="2"/>
      <circle cx="34" cy="34" r="20" fill="#2a66d9"/><text x="34" y="41" fill="#fff" text-anchor="middle" font-size="18" font-weight="800">1</text>
      <text x="24" y="80" fill="#14213d" font-size="19" font-weight="800"><tspan x="24">Incoming</tspan><tspan x="24" dy="23">Materials</tspan></text>
      <text x="24" y="142" fill="#40516f" font-size="15"><tspan x="24">Salts and solvents</tspan><tspan x="24" dy="25">Water / HF / metals</tspan><tspan x="24" dy="25">Active-material PSD</tspan><tspan x="24" dy="25">Surface area</tspan><tspan x="24" dy="25">Solid-electrolyte phase</tspan></text>
      <rect x="16" y="306" width="184" height="42" rx="12" fill="#eaf2ff"/><text x="108" y="332" text-anchor="middle" fill="#245fc8" font-size="13" font-weight="800">COA + verification</text>
    </g>
    <g transform="translate(261 138)">
      <rect width="216" height="372" rx="18" fill="#fff" stroke="#75c9bd" stroke-width="2"/>
      <circle cx="34" cy="34" r="20" fill="#168c83"/><text x="34" y="41" fill="#fff" text-anchor="middle" font-size="18" font-weight="800">2</text>
      <text x="24" y="91" fill="#14213d" font-size="19" font-weight="800">Electrodes</text>
      <text x="24" y="142" fill="#40516f" font-size="15"><tspan x="24">Loading and density</tspan><tspan x="24" dy="25">Thickness uniformity</tspan><tspan x="24" dy="25">Porosity and adhesion</tspan><tspan x="24" dy="25">Residual moisture</tspan><tspan x="24" dy="25">N/P or capacity balance</tspan></text>
      <rect x="16" y="306" width="184" height="42" rx="12" fill="#e4f6f2"/><text x="108" y="332" text-anchor="middle" fill="#167a73" font-size="13" font-weight="800">Process capability</text>
    </g>
    <g transform="translate(492 138)">
      <rect width="216" height="372" rx="18" fill="#fff" stroke="#d9bd72" stroke-width="2"/>
      <circle cx="34" cy="34" r="20" fill="#b8964a"/><text x="34" y="41" fill="#fff" text-anchor="middle" font-size="18" font-weight="800">3</text>
      <text x="24" y="91" fill="#14213d" font-size="19" font-weight="800">Cell Assembly</text>
      <text x="24" y="142" fill="#40516f" font-size="15"><tspan x="24">Electrolyte loading</tspan><tspan x="24" dy="25">Fill and wetting time</tspan><tspan x="24" dy="25">Alignment and tabs</tspan><tspan x="24" dy="25">Stack pressure</tspan><tspan x="24" dy="25">Seal and leak checks</tspan></text>
      <rect x="16" y="306" width="184" height="42" rx="12" fill="#fbf2dc"/><text x="108" y="332" text-anchor="middle" fill="#94731f" font-size="13" font-weight="800">Assembly traceability</text>
    </g>
    <g transform="translate(723 138)">
      <rect width="216" height="372" rx="18" fill="#fff" stroke="#9baee2" stroke-width="2"/>
      <circle cx="34" cy="34" r="20" fill="#596eb4"/><text x="34" y="41" fill="#fff" text-anchor="middle" font-size="18" font-weight="800">4</text>
      <text x="24" y="91" fill="#14213d" font-size="19" font-weight="800">Electrochemistry</text>
      <text x="24" y="142" fill="#40516f" font-size="15"><tspan x="24">Formation CE and dQ/dV</tspan><tspan x="24" dy="25">EIS and DCIR</tspan><tspan x="24" dy="25">Rate and retention</tspan><tspan x="24" dy="25">Self-discharge</tspan><tspan x="24" dy="25">Temperature response</tspan></text>
      <rect x="16" y="306" width="184" height="42" rx="12" fill="#edf0fb"/><text x="108" y="332" text-anchor="middle" fill="#485d9f" font-size="13" font-weight="800">Matched test protocol</text>
    </g>
    <g transform="translate(954 138)">
      <rect width="216" height="372" rx="18" fill="#fff" stroke="#e69a9a" stroke-width="2"/>
      <circle cx="34" cy="34" r="20" fill="#cf4141"/><text x="34" y="41" fill="#fff" text-anchor="middle" font-size="18" font-weight="800">5</text>
      <text x="24" y="80" fill="#14213d" font-size="19" font-weight="800"><tspan x="24">Failure</tspan><tspan x="24" dy="23">Analysis</tspan></text>
      <text x="24" y="142" fill="#40516f" font-size="15"><tspan x="24">Gas composition</tspan><tspan x="24" dy="25">SEM / XPS / ICP</tspan><tspan x="24" dy="25">Lithium plating</tspan><tspan x="24" dy="25">Electrode cross-talk</tspan><tspan x="24" dy="25">Root-cause closure</tspan></text>
      <rect x="16" y="306" width="184" height="42" rx="12" fill="#fdeaea"/><text x="108" y="332" text-anchor="middle" fill="#b33131" font-size="13" font-weight="800">Diagnosis, not guessing</text>
    </g>
    <g fill="#14213d"><path d="M248 312 l11 9 -11 9z"/><path d="M479 312 l11 9 -11 9z"/><path d="M710 312 l11 9 -11 9z"/><path d="M941 312 l11 9 -11 9z"/></g>
    <rect x="60" y="554" width="1080" height="112" rx="20" fill="#e8f0fb" stroke="#bed0e8"/>
    <text x="600" y="588" fill="#14213d" font-size="17" text-anchor="middle" font-weight="800"><tspan x="600">The minimum useful comparison is a controlled lot, a documented process,</tspan><tspan x="600" dy="23">and enough replicate cells.</tspan></text>
    <text x="600" y="644" fill="#52617b" font-size="15" text-anchor="middle">The evidence chain should identify whether failure began in material, electrode, assembly, protocol, or interaction.</text>
  </g>
</svg>
