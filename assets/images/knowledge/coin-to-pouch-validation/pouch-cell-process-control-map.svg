<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Pouch-cell process control map</title>
  <desc id="desc">A centered pouch-cell stack surrounded by controls for wetting, formation, gas and swelling, and pressure and contact.</desc>
  <rect width="1200" height="800" fill="#f4f7fb"/>
  <rect width="1200" height="92" fill="#14213d"/>
  <text x="48" y="58" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="800">What Pouch Cells Reveal That Coin Cells Often Hide</text>
  <g font-family="Inter,Arial,sans-serif">
    <g transform="translate(390 184)">
      <rect width="420" height="350" rx="28" fill="#fff" stroke="#b7c6da" stroke-width="2"/>
      <text x="210" y="46" text-anchor="middle" fill="#14213d" font-size="24" font-weight="800">Larger-Area Cell Stack</text>
      <rect x="72" y="86" width="276" height="36" rx="6" fill="#b9c5d5"/><text x="210" y="110" text-anchor="middle" fill="#14213d" font-size="14" font-weight="700">Al current collector</text>
      <rect x="72" y="128" width="276" height="64" rx="6" fill="#7857b8"/><text x="210" y="166" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Cathode coating</text>
      <rect x="72" y="198" width="276" height="46" rx="6" fill="#e6c35b"/><text x="210" y="227" text-anchor="middle" fill="#14213d" font-size="14" font-weight="700">Separator + electrolyte</text>
      <rect x="72" y="250" width="276" height="64" rx="6" fill="#71839b"/><text x="210" y="288" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Graphite / Si / Li-metal anode</text>
      <rect x="72" y="320" width="276" height="22" rx="5" fill="#c8884b"/>
    </g>

    <g transform="translate(30 132)">
      <rect width="330" height="224" rx="18" fill="#fff" stroke="#8bb4ed" stroke-width="2"/>
      <text x="24" y="42" fill="#2a66d9" font-size="21" font-weight="800"><tspan x="24">Electrolyte Filling</tspan><tspan x="24" dy="25">&amp; Wetting</tspan></text>
      <text x="24" y="106" fill="#40516f" font-size="15"><tspan x="24">• viscosity and surface tension</tspan><tspan x="24" dy="27">• electrode porosity and tortuosity</tspan><tspan x="24" dy="27">• separator wettability</tspan><tspan x="24" dy="27">• vacuum fill, rest time, trapped gas</tspan></text>
    </g>
    <path d="M360 244 H382" stroke="#2a66d9" stroke-width="5"/><path d="M382 244 l-14 -10 v20z" fill="#2a66d9"/>

    <g transform="translate(840 132)">
      <rect width="330" height="224" rx="18" fill="#fff" stroke="#75c9bd" stroke-width="2"/>
      <text x="24" y="42" fill="#168c83" font-size="21" font-weight="800"><tspan x="24">Formation</tspan><tspan x="24" dy="25">&amp; Interphases</tspan></text>
      <text x="24" y="106" fill="#40516f" font-size="15"><tspan x="24">• SEI/CEI reaction sequence</tspan><tspan x="24" dy="27">• additive consumption and gas</tspan><tspan x="24" dy="27">• current, voltage holds, temperature</tspan><tspan x="24" dy="27">• irreversible capacity and expansion</tspan></text>
    </g>
    <path d="M818 244 H840" stroke="#168c83" stroke-width="5"/><path d="M818 244 l14 -10 v20z" fill="#168c83"/>

    <g transform="translate(30 430)">
      <rect width="330" height="224" rx="18" fill="#fff" stroke="#e4c26c" stroke-width="2"/>
      <text x="24" y="42" fill="#9b7518" font-size="21" font-weight="800"><tspan x="24">Gas, Swelling</tspan><tspan x="24" dy="25">&amp; Degassing</tspan></text>
      <text x="24" y="106" fill="#40516f" font-size="15"><tspan x="24">• formation gas and storage gas</tspan><tspan x="24" dy="27">• pouch thickness and pressure</tspan><tspan x="24" dy="27">• electrolyte decomposition pathways</tspan><tspan x="24" dy="27">• seal integrity and degassing timing</tspan></text>
    </g>
    <path d="M360 542 H382" stroke="#b8964a" stroke-width="5"/><path d="M382 542 l-14 -10 v20z" fill="#b8964a"/>

    <g transform="translate(840 430)">
      <rect width="330" height="224" rx="18" fill="#fff" stroke="#e69a9a" stroke-width="2"/>
      <text x="24" y="42" fill="#c83d3d" font-size="21" font-weight="800"><tspan x="24">Pressure, Contact</tspan><tspan x="24" dy="25">&amp; Area</tspan></text>
      <text x="24" y="106" fill="#40516f" font-size="15"><tspan x="24">• nonuniform stack pressure</tspan><tspan x="24" dy="27">• silicon expansion and contact loss</tspan><tspan x="24" dy="27">• lithium plating / stripping uniformity</tspan><tspan x="24" dy="27">• solid-state interface and crack control</tspan></text>
    </g>
    <path d="M818 542 H840" stroke="#cf4141" stroke-width="5"/><path d="M818 542 l14 -10 v20z" fill="#cf4141"/>

    <rect x="290" y="674" width="620" height="82" rx="18" fill="#e7eef8" stroke="#bdcce0"/>
    <text x="600" y="706" text-anchor="middle" fill="#14213d" font-size="18" font-weight="800">Pouch validation is a chemistry + process test.</text>
    <text x="600" y="734" text-anchor="middle" fill="#52617b" font-size="14">A good material can fail when filling, formation, pressure, or gas control is wrong.</text>
  </g>
</svg>
