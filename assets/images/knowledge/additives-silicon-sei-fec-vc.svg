<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">FEC and VC pathways in silicon-anode SEI screening</title>
  <desc id="desc">Conceptual comparison of silicon expansion, FEC reduction and LiF-containing interphase formation, and VC-derived organic polymeric interphase formation.</desc>
  <rect width="1200" height="700" fill="#f4f7fb"/>
  <rect width="1200" height="92" fill="#14213d"/>
  <text x="48" y="56" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Silicon-Anode SEI Screening: FEC and VC Are Not Equivalent</text>

  <rect x="48" y="126" width="340" height="490" rx="16" fill="#ffffff" stroke="#cfd8e6" stroke-width="2"/>
  <text x="76" y="171" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#14213d">Silicon failure driver</text>
  <circle cx="218" cy="292" r="90" fill="#8399b7"/>
  <circle cx="218" cy="292" r="61" fill="#aab9cd"/>
  <path d="M154 225 L191 257 L173 299 L210 333 L191 377" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <path d="M261 215 L242 259 L279 288 L247 333 L275 372" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <text x="76" y="430" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#14213d">Repeated volume change can:</text>
  <circle cx="84" cy="465" r="5" fill="#b8964a"/><text x="100" y="471" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4c5e78">crack the interphase</text>
  <circle cx="84" cy="500" r="5" fill="#b8964a"/><text x="100" y="506" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4c5e78">expose fresh silicon</text>
  <circle cx="84" cy="535" r="5" fill="#b8964a"/><text x="100" y="541" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4c5e78">consume electrolyte and lithium</text>
  <circle cx="84" cy="570" r="5" fill="#b8964a"/><text x="100" y="576" font-family="Inter, Arial, sans-serif" font-size="17" fill="#4c5e78">increase gas and impedance</text>

  <path d="M411 370 H472" stroke="#8494aa" stroke-width="4"/>
  <path d="M462 356 L482 370 L462 384" fill="none" stroke="#8494aa" stroke-width="4"/>

  <rect x="490" y="126" width="310" height="490" rx="16" fill="#ffffff" stroke="#8ab9ff" stroke-width="3"/>
  <rect x="490" y="126" width="310" height="70" rx="16" fill="#e8f1ff"/>
  <text x="518" y="169" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#2a66d9">FEC-containing route</text>
  <circle cx="645" cy="292" r="82" fill="#8095b4"/>
  <circle cx="645" cy="292" r="103" fill="none" stroke="#2a66d9" stroke-width="20" stroke-dasharray="24 10"/>
  <text x="530" y="432" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#14213d">Reported chemical emphasis</text>
  <rect x="530" y="454" width="230" height="44" rx="22" fill="#e7f0ff"/>
  <text x="645" y="482" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#2a66d9">F- and LiF-containing SEI</text>
  <text x="530" y="530" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">Evaluate additive consumption,</text>
  <text x="530" y="556" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">gas, impedance, and continued</text>
  <text x="530" y="582" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">repair during silicon expansion.</text>

  <rect x="842" y="126" width="310" height="490" rx="16" fill="#ffffff" stroke="#d9bd70" stroke-width="3"/>
  <rect x="842" y="126" width="310" height="70" rx="16" fill="#fff5d8"/>
  <text x="870" y="169" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#9a7418">VC-containing route</text>
  <circle cx="997" cy="292" r="82" fill="#8095b4"/>
  <path d="M897 270 C925 225 956 244 978 220 C1004 192 1030 232 1053 211 C1081 187 1101 236 1094 267" fill="none" stroke="#b8964a" stroke-width="14" stroke-linecap="round"/>
  <path d="M901 311 C927 278 953 313 980 284 C1008 254 1032 299 1062 270 C1080 253 1097 275 1098 307" fill="none" stroke="#b8964a" stroke-width="14" stroke-linecap="round"/>
  <text x="882" y="432" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#14213d">Reported chemical emphasis</text>
  <rect x="868" y="454" width="258" height="44" rx="22" fill="#fff3cf"/>
  <text x="997" y="482" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#9a7418">Organic / polymeric SEI routes</text>
  <text x="882" y="530" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">Compare reaction products and</text>
  <text x="882" y="556" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">passivation under the same silicon,</text>
  <text x="882" y="582" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4c5e78">binder, loading, and formation.</text>

  <text x="600" y="665" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#14213d">The useful comparison is mechanism + cell response, not additive name alone.</text>
</svg>
