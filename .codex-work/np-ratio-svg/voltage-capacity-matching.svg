<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Electrode voltage matching and usable full-cell capacity at different N/P ratios</title>
  <desc id="desc">Three panels compare low, balanced, and high N/P ratios. Each panel overlays cathode and anode half-cell potentials and shows the corresponding full-cell voltage below.</desc>
  <defs>
    <style>
      .title{font:800 28px Inter,Arial,sans-serif;fill:#fff}.subtitle{font:600 14px Inter,Arial,sans-serif;fill:#dbe6f4}
      .panel-title{font:800 21px Inter,Arial,sans-serif;fill:#122033}.panel-sub{font:600 14px Inter,Arial,sans-serif;fill:#52627b}
      .plot-title{font:800 15px Inter,Arial,sans-serif;fill:#122033}.axis-label{font:700 13px Inter,Arial,sans-serif;fill:#42516a}
      .tick{font:600 12px Inter,Arial,sans-serif;fill:#63718a}.note{font:700 13px Inter,Arial,sans-serif;fill:#26364e}
      .takeaway{font:800 14px Inter,Arial,sans-serif;fill:#122033}.takeaway-sub{font:600 13px Inter,Arial,sans-serif;fill:#52627b}.formula{font:800 16px Inter,Arial,sans-serif;fill:#122033}
      .panel{fill:#fff;stroke:#d4deeb;stroke-width:1.5}.plot{fill:#fbfcfe;stroke:#e0e6ef;stroke-width:1}
      .axis{stroke:#14213d;stroke-width:1.7}.grid{stroke:#dfe6f0;stroke-width:1}.cathode{stroke:#7556bd;stroke-width:4;fill:none}
      .anode{stroke:#d9693b;stroke-width:4;fill:none}.cell{stroke:#14213d;stroke-width:4;fill:none}.unsafe{stroke:#cf3b3b;stroke-width:3;fill:none;stroke-dasharray:7 5}
      .limit-red{stroke:#cf3b3b;stroke-width:2;stroke-dasharray:7 5}.limit-green{stroke:#168b84;stroke-width:2;stroke-dasharray:7 5}.limit-gray{stroke:#748096;stroke-width:2;stroke-dasharray:7 5}
      .voltage-gap{stroke:#2f6edb;stroke-width:2;marker-start:url(#gap-start);marker-end:url(#gap-end)}
    </style>
    <marker id="gap-start" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M8 0L0 4L8 8Z" fill="#2f6edb"/></marker>
    <marker id="gap-end" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#2f6edb"/></marker>
  </defs>

  <rect width="1200" height="900" rx="28" fill="#f3f6fb"/>
  <rect width="1200" height="96" rx="28" fill="#14213d"/>
  <rect y="68" width="1200" height="28" fill="#14213d"/>
  <text x="42" y="46" class="title">Electrode Voltage Matching and Usable Full-Cell Capacity</text>
  <text x="42" y="72" class="subtitle">LFP/graphite-style curves show how N/P changes the anode endpoint, receiving buffer, and cell-level energy tradeoff</text>

  <!-- Panel A -->
  <g transform="translate(24 122)">
    <rect width="368" height="704" rx="20" class="panel"/>
    <text x="20" y="34" class="panel-title">A. N/P too low</text>
    <text x="20" y="56" class="panel-sub">Qn = 4.20; Qp = 4.61 mAh/cm²; N/P = 0.91</text>

    <text x="20" y="86" class="plot-title">Half-cell potentials on common charge axis</text>
    <rect x="44" y="98" width="292" height="260" rx="10" class="plot"/>
    <line x1="68" y1="326" x2="320" y2="326" class="axis"/><line x1="68" y1="326" x2="68" y2="118" class="axis"/>
    <line x1="68" y1="274" x2="320" y2="274" class="grid"/><line x1="68" y1="222" x2="320" y2="222" class="grid"/><line x1="68" y1="170" x2="320" y2="170" class="grid"/>
    <text x="55" y="330" class="tick" text-anchor="end">0</text><text x="55" y="278" class="tick" text-anchor="end">1</text><text x="55" y="226" class="tick" text-anchor="end">2</text><text x="55" y="174" class="tick" text-anchor="end">3</text><text x="55" y="122" class="tick" text-anchor="end">4</text>
    <text x="18" y="226" class="axis-label" text-anchor="middle" transform="rotate(-90 18 226)">Potential vs Li/Li+ / V</text>
    <path d="M76 152 C124 150 174 149 216 147 C239 145 250 140 255 136" class="cathode"/>
    <path d="M76 279 C88 301 101 313 122 317 C160 320 198 321 229 323" class="anode"/>
    <rect x="229" y="99" width="26" height="227" fill="#ffe3e3" opacity=".38"/>
    <line x1="229" y1="99" x2="229" y2="326" class="limit-red"/>
    <line x1="255" y1="99" x2="255" y2="326" class="limit-gray"/>
    <text x="224" y="345" class="tick" text-anchor="end">Qn</text><text x="260" y="345" class="tick">Qp</text>
    <line x1="90" y1="108" x2="118" y2="108" class="cathode"/><text x="124" y="112" class="tick">cathode</text>
    <line x1="192" y1="108" x2="220" y2="108" class="anode"/><text x="226" y="112" class="tick">anode</text>
    <line x1="170" y1="168" x2="170" y2="302" class="voltage-gap"/><text x="192" y="320" class="tick" fill="#2f6edb" transform="rotate(-90 192 320)">Vcell = Ucathode - Uanode</text>
    <text x="242" y="233" class="note" fill="#b72f2f" text-anchor="middle" transform="rotate(-90 242 233)">anode capacity exhausted</text>

    <text x="20" y="394" class="plot-title">Derived full-cell voltage</text>
    <rect x="44" y="406" width="292" height="176" rx="10" class="plot"/>
    <line x1="68" y1="554" x2="320" y2="554" class="axis"/><line x1="68" y1="554" x2="68" y2="426" class="axis"/>
    <line x1="68" y1="514" x2="320" y2="514" class="grid"/><line x1="68" y1="474" x2="320" y2="474" class="grid"/>
    <text x="55" y="558" class="tick" text-anchor="end">2.4</text><text x="55" y="518" class="tick" text-anchor="end">3.0</text><text x="55" y="478" class="tick" text-anchor="end">3.6</text>
    <text x="28" y="492" class="axis-label" text-anchor="middle" transform="rotate(-90 28 492)">Full-cell voltage / V</text>
    <path d="M76 550 C88 528 101 509 122 498 C160 491 198 489 229 486" class="cell"/>
    <path d="M229 486 C239 483 247 480 255 478" class="unsafe"/>
    <line x1="229" y1="407" x2="229" y2="554" class="limit-red"/>
    <text x="178" y="574" class="axis-label" text-anchor="middle">Charge capacity, q / mAh/cm²</text>
    <text x="270" y="438" class="note" fill="#a62424" text-anchor="middle"><tspan x="270">not a valid safe</tspan><tspan x="270" dy="15">charge region</tspan></text>

    <rect x="20" y="612" width="328" height="68" rx="12" fill="#fff0f0"/>
    <text x="184" y="632" class="takeaway" text-anchor="middle" fill="#b72f2f">Anode endpoint arrives first</text>
    <text x="184" y="653" class="takeaway-sub" text-anchor="middle">Usable capacity is anode-limited;</text>
    <text x="184" y="670" class="takeaway-sub" text-anchor="middle">further charge increases plating risk.</text>
  </g>

  <!-- Panel B -->
  <g transform="translate(416 122)">
    <rect width="368" height="704" rx="20" class="panel"/>
    <text x="20" y="34" class="panel-title">B. Balanced practical margin</text>
    <text x="20" y="56" class="panel-sub">Qn = 5.32; Qp = 4.61 mAh/cm²; N/P = 1.15</text>

    <text x="20" y="86" class="plot-title">Half-cell potentials on common charge axis</text>
    <rect x="44" y="98" width="292" height="260" rx="10" class="plot"/>
    <line x1="68" y1="326" x2="320" y2="326" class="axis"/><line x1="68" y1="326" x2="68" y2="118" class="axis"/>
    <line x1="68" y1="274" x2="320" y2="274" class="grid"/><line x1="68" y1="222" x2="320" y2="222" class="grid"/><line x1="68" y1="170" x2="320" y2="170" class="grid"/>
    <text x="55" y="330" class="tick" text-anchor="end">0</text><text x="55" y="278" class="tick" text-anchor="end">1</text><text x="55" y="226" class="tick" text-anchor="end">2</text><text x="55" y="174" class="tick" text-anchor="end">3</text><text x="55" y="122" class="tick" text-anchor="end">4</text>
    <text x="18" y="226" class="axis-label" text-anchor="middle" transform="rotate(-90 18 226)">Potential vs Li/Li+ / V</text>
    <path d="M76 152 C124 150 174 149 216 147 C239 145 250 140 255 136" class="cathode"/>
    <path d="M76 279 C90 300 105 311 128 316 C178 319 232 321 284 323" class="anode"/>
    <rect x="255" y="99" width="29" height="227" fill="#dff4ef" opacity=".42"/>
    <line x1="255" y1="99" x2="255" y2="326" class="limit-green"/><line x1="284" y1="99" x2="284" y2="326" class="limit-gray"/>
    <text x="250" y="345" class="tick" text-anchor="end">Qp</text><text x="289" y="345" class="tick">Qn</text>
    <line x1="90" y1="108" x2="118" y2="108" class="cathode"/><text x="124" y="112" class="tick">cathode</text>
    <line x1="192" y1="108" x2="220" y2="108" class="anode"/><text x="226" y="112" class="tick">anode</text>
    <line x1="170" y1="168" x2="170" y2="302" class="voltage-gap"/><text x="192" y="320" class="tick" fill="#2f6edb" transform="rotate(-90 192 320)">Vcell = Ucathode - Uanode</text>
    <text x="270" y="229" class="note" fill="#167c76" text-anchor="middle" transform="rotate(-90 270 229)">0.71 mAh/cm² reserve (~15%)</text>

    <text x="20" y="394" class="plot-title">Derived full-cell voltage</text>
    <rect x="44" y="406" width="292" height="176" rx="10" class="plot"/>
    <line x1="68" y1="554" x2="320" y2="554" class="axis"/><line x1="68" y1="554" x2="68" y2="426" class="axis"/>
    <line x1="68" y1="514" x2="320" y2="514" class="grid"/><line x1="68" y1="474" x2="320" y2="474" class="grid"/>
    <text x="55" y="558" class="tick" text-anchor="end">2.4</text><text x="55" y="518" class="tick" text-anchor="end">3.0</text><text x="55" y="478" class="tick" text-anchor="end">3.6</text>
    <text x="28" y="492" class="axis-label" text-anchor="middle" transform="rotate(-90 28 492)">Full-cell voltage / V</text>
    <path d="M76 550 C90 527 106 507 128 497 C176 490 224 487 255 478" class="cell"/>
    <line x1="255" y1="407" x2="255" y2="554" class="limit-green"/>
    <text x="178" y="574" class="axis-label" text-anchor="middle">Charge capacity, q / mAh/cm²</text>

    <rect x="20" y="612" width="328" height="68" rx="12" fill="#e4f5f2"/>
    <text x="184" y="632" class="takeaway" text-anchor="middle" fill="#167c76">Cathode sets usable capacity</text>
    <text x="184" y="653" class="takeaway-sub" text-anchor="middle">The anode retains a controlled</text>
    <text x="184" y="670" class="takeaway-sub" text-anchor="middle">receiving-capacity buffer.</text>
  </g>

  <!-- Panel C -->
  <g transform="translate(808 122)">
    <rect width="368" height="704" rx="20" class="panel"/>
    <text x="20" y="34" class="panel-title">C. N/P too high</text>
    <text x="20" y="56" class="panel-sub">Qn = 6.10; Qp = 4.61 mAh/cm²; N/P = 1.32</text>

    <text x="20" y="86" class="plot-title">Half-cell potentials on common charge axis</text>
    <rect x="44" y="98" width="292" height="260" rx="10" class="plot"/>
    <line x1="68" y1="326" x2="320" y2="326" class="axis"/><line x1="68" y1="326" x2="68" y2="118" class="axis"/>
    <line x1="68" y1="274" x2="320" y2="274" class="grid"/><line x1="68" y1="222" x2="320" y2="222" class="grid"/><line x1="68" y1="170" x2="320" y2="170" class="grid"/>
    <text x="55" y="330" class="tick" text-anchor="end">0</text><text x="55" y="278" class="tick" text-anchor="end">1</text><text x="55" y="226" class="tick" text-anchor="end">2</text><text x="55" y="174" class="tick" text-anchor="end">3</text><text x="55" y="122" class="tick" text-anchor="end">4</text>
    <text x="18" y="226" class="axis-label" text-anchor="middle" transform="rotate(-90 18 226)">Potential vs Li/Li+ / V</text>
    <path d="M76 152 C124 150 174 149 216 147 C239 145 250 140 255 136" class="cathode"/>
    <path d="M76 279 C92 299 109 310 134 315 C190 319 255 321 314 323" class="anode"/>
    <rect x="255" y="99" width="59" height="227" fill="#e1e6ee" opacity=".38"/>
    <line x1="255" y1="99" x2="255" y2="326" class="limit-gray"/><line x1="314" y1="99" x2="314" y2="326" class="limit-gray"/>
    <text x="250" y="345" class="tick" text-anchor="end">Qp</text><text x="319" y="345" class="tick">Qn</text>
    <line x1="90" y1="108" x2="118" y2="108" class="cathode"/><text x="124" y="112" class="tick">cathode</text>
    <line x1="192" y1="108" x2="220" y2="108" class="anode"/><text x="226" y="112" class="tick">anode</text>
    <line x1="170" y1="168" x2="170" y2="302" class="voltage-gap"/><text x="192" y="320" class="tick" fill="#2f6edb" transform="rotate(-90 192 320)">Vcell = Ucathode - Uanode</text>
    <text x="284" y="208" class="note" text-anchor="middle" transform="rotate(-90 284 208)">excess reserve lowers cell energy</text>

    <text x="20" y="394" class="plot-title">Derived full-cell voltage</text>
    <rect x="44" y="406" width="292" height="176" rx="10" class="plot"/>
    <line x1="68" y1="554" x2="320" y2="554" class="axis"/><line x1="68" y1="554" x2="68" y2="426" class="axis"/>
    <line x1="68" y1="514" x2="320" y2="514" class="grid"/><line x1="68" y1="474" x2="320" y2="474" class="grid"/>
    <text x="55" y="558" class="tick" text-anchor="end">2.4</text><text x="55" y="518" class="tick" text-anchor="end">3.0</text><text x="55" y="478" class="tick" text-anchor="end">3.6</text>
    <text x="28" y="492" class="axis-label" text-anchor="middle" transform="rotate(-90 28 492)">Full-cell voltage / V</text>
    <path d="M76 550 C92 527 109 507 134 497 C180 490 225 487 255 478" class="cell"/>
    <rect x="255" y="407" width="59" height="147" fill="#cbd2dc" opacity=".62"/>
    <line x1="255" y1="407" x2="255" y2="554" class="limit-gray"/>
    <text x="178" y="574" class="axis-label" text-anchor="middle">Charge capacity, q / mAh/cm²</text>
    <text x="284" y="448" class="tick" text-anchor="middle"><tspan x="284">unused anode</tspan><tspan x="284" dy="14">capacity does not</tspan><tspan x="284" dy="14">add cell capacity</tspan></text>

    <rect x="20" y="612" width="328" height="68" rx="12" fill="#edf0f4"/>
    <text x="184" y="632" class="takeaway" text-anchor="middle">Excess anode inventory</text>
    <text x="184" y="653" class="takeaway-sub" text-anchor="middle">Capacity remains cathode-limited while</text>
    <text x="184" y="670" class="takeaway-sub" text-anchor="middle">cell-level specific energy decreases.</text>
  </g>

  <rect x="132" y="846" width="936" height="38" rx="12" fill="#eaf2ff" stroke="#8fb5f7"/>
  <text x="600" y="871" class="formula" text-anchor="middle">Vcell(q) = Upositive(q / Qp) - Unegative(q / Qn); usable charge ends at the first safe electrode endpoint.</text>
  <text x="1172" y="892" text-anchor="end" style="font:600 10px Inter,Arial,sans-serif;fill:#7c8799">© Winigen Materials · winigenmaterials.com</text>
</svg>
